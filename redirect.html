<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>Signing in...</title>
<style>
  body{font-family:-apple-system,sans-serif;display:flex;align-items:center;
       justify-content:center;height:100vh;margin:0;background:#0e0b1f;color:#c4b5e8}
  .msg{text-align:center;padding:20px}
  .spinner{width:32px;height:32px;border:3px solid rgba(175,97,255,.3);
           border-top-color:#af61ff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="msg">
  <div class="spinner"></div>
  <div>Completing sign-in...</div>
</div>
<script>
(function(){
  // Parse the URL fragment for token or error
  var hash = window.location.hash.substring(1) || window.location.search.substring(1);
  var params = {};
  hash.split('&').forEach(function(p){
    var kv = p.split('=');
    if(kv[0]) params[decodeURIComponent(kv[0])] = decodeURIComponent((kv[1]||'').replace(/\+/g,' '));
  });

  var msg = { type: 'ms_auth_token' };

  if(params.access_token){
    msg.access_token = params.access_token;
    msg.expires_in   = parseInt(params.expires_in || '3600');
    msg.token_type   = params.token_type || 'Bearer';
  } else if(params.error){
    msg.error             = params.error;
    msg.error_description = params.error_description || params.error;
  } else {
    msg.error = 'no_token';
    msg.error_description = 'No token received in redirect';
  }

  // Post to opener (the inspection app)
  if(window.opener){
    window.opener.postMessage(msg, '*');
  }

  // Close this popup after a short delay
  setTimeout(function(){ window.close(); }, 300);
})();
</script>
</body>
</html>
